version: 2

models:
  - name: stg_study
    columns:
      - name: nct_id
        tests:
          - not_null
          - unique

      - name: overall_status
        tests:
          - not_null

      - name: study_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["INTERVENTIONAL", "OBSERVATIONAL", "EXPANDED_ACCESS"]
